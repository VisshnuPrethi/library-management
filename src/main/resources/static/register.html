<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Register – Library System</title>
<link rel="stylesheet" href="/css/style.css"></head>
<body>
<nav class="navbar">
  <div class="nav-brand">📚 Library System</div>
  <div class="nav-links"><a href="/index.html">Books</a><a href="/login.html">Login</a><a href="/register.html">Register</a></div>
</nav>
<main class="container form-container">
  <div class="form-card">
    <h2>Create Account</h2>
    <div id="errorMsg" class="message error" style="display:none"></div>
    <div id="successMsg" class="message success" style="display:none"></div>
    <div class="form-group"><label for="username">Username</label>
      <input type="text" id="username" maxlength="50" autocomplete="off" placeholder="3-50 chars, letters/digits/_">
      <span class="field-error" id="usernameErr"></span></div>
    <div class="form-group"><label for="email">Email</label>
      <input type="text" id="email" maxlength="100" autocomplete="off">
      <span class="field-error" id="emailErr"></span></div>
    <div class="form-group"><label for="password">Password</label>
      <input type="password" id="password" maxlength="100" autocomplete="off" placeholder="Min 8 chars, upper+lower+digit+special">
      <span class="field-error" id="passwordErr"></span></div>
    <div class="form-group"><label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" maxlength="100" autocomplete="off">
      <span class="field-error" id="confirmErr"></span></div>
    <button type="button" class="btn btn-full" onclick="doRegister()">Register</button>
    <p class="form-footer">Have an account? <a href="/login.html">Login here</a></p>
  </div>
</main>
<script src="/js/auth.js"></script>
<script>
if(getToken())window.location.href='/index.html';
async function doRegister(){
  ['errorMsg','successMsg'].forEach(function(id){document.getElementById(id).style.display='none'});
  ['usernameErr','emailErr','passwordErr','confirmErr'].forEach(function(id){document.getElementById(id).textContent=''});
  var username=document.getElementById('username').value.trim();
  var email=document.getElementById('email').value.trim();
  var password=document.getElementById('password').value;
  var confirm=document.getElementById('confirm').value;
  var ok=true;
  if(!username||username.length<3){document.getElementById('usernameErr').textContent='Min 3 characters';ok=false}
  else if(!/^[a-zA-Z0-9_]+$/.test(username)){document.getElementById('usernameErr').textContent='Letters, digits, _ only';ok=false}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){document.getElementById('emailErr').textContent='Valid email required';ok=false}
  if(!password||password.length<8){document.getElementById('passwordErr').textContent='Min 8 characters';ok=false}
  else if(!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&_#])/.test(password)){document.getElementById('passwordErr').textContent='Need upper, lower, digit and special char';ok=false}
  if(password!==confirm){document.getElementById('confirmErr').textContent='Passwords do not match';ok=false}
  if(!ok)return;
  try{
    var res=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,email:email,password:password})});
    var data=await res.json();
    if(!res.ok){
      if(data.details)Object.entries(data.details).forEach(function(e){var el=document.getElementById(e[0]+'Err');if(el)el.textContent=e[1]});
      else{document.getElementById('errorMsg').textContent=data.error||data.message||'Failed';document.getElementById('errorMsg').style.display='block'}
      return;
    }
    document.getElementById('successMsg').textContent='Registered! Redirecting to login...';
    document.getElementById('successMsg').style.display='block';
    setTimeout(function(){window.location.href='/login.html'},2000);
  }catch(e){document.getElementById('errorMsg').textContent='Connection error';document.getElementById('errorMsg').style.display='block'}
}
</script>
</body></html>
