<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login – Library System</title>
<link rel="stylesheet" href="/css/style.css"></head>
<body>
<nav class="navbar">
  <div class="nav-brand">📚 Library System</div>
  <div class="nav-links"><a href="/index.html">Books</a><a href="/login.html">Login</a><a href="/register.html">Register</a></div>
</nav>
<main class="container form-container">
  <div class="form-card">
    <h2>Sign In</h2>
    <div id="errorMsg" class="message error" style="display:none"></div>
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" maxlength="50" autocomplete="off">
      <span class="field-error" id="usernameErr"></span>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" maxlength="100" autocomplete="off">
      <span class="field-error" id="passwordErr"></span>
    </div>
    <button type="button" class="btn btn-full" onclick="doLogin()">Login</button>
    <p class="form-footer">No account? <a href="/register.html">Register here</a></p>
  </div>
</main>
<script src="/js/auth.js"></script>
<script>
if(getToken())window.location.href=getRole()==='LIBRARIAN'?'/admin.html':'/index.html';
document.getElementById('password').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
async function doLogin(){
  document.getElementById('errorMsg').style.display='none';
  document.getElementById('usernameErr').textContent='';
  document.getElementById('passwordErr').textContent='';
  var username=document.getElementById('username').value.trim();
  var password=document.getElementById('password').value;
  if(!username){document.getElementById('usernameErr').textContent='Required';return}
  if(!password){document.getElementById('passwordErr').textContent='Required';return}
  try{
    var res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,password:password})});
    var data=await res.json();
    if(!res.ok){document.getElementById('errorMsg').textContent=data.message||data.error||'Login failed';document.getElementById('errorMsg').style.display='block';return}
    localStorage.setItem('token',data.token);
    localStorage.setItem('username',data.username);
    localStorage.setItem('role',data.role);
    window.location.href=data.role==='LIBRARIAN'?'/admin.html':'/index.html';
  }catch(e){document.getElementById('errorMsg').textContent='Connection error. Is the server running?';document.getElementById('errorMsg').style.display='block'}
}
</script>
</body></html>
